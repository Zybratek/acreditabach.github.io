<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía Acredita Bach · Acuerdo 286</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --border:#d6dbe6;
  --text:#1a1a1a;
  --text2:#4a5568;
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  text-align:center;
  padding:clamp(1.5rem,4vw,2.5rem) 1rem;
}

header h1{
  font-size:clamp(22px,4vw,32px);
  margin-bottom:6px;
}

header p{
  color:var(--text2);
  font-size:clamp(13px,2.5vw,15px);
}

/* GRID RESPONSIVO */
main{
  width:100%;
  max-width:1000px;
  margin:auto;
  padding:clamp(1rem,3vw,2rem);

  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:clamp(12px,2vw,18px);
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:clamp(16px,3vw,22px);
  text-decoration:none;
  color:inherit;

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  min-height:clamp(120px,18vw,160px);

  transition:all .25s ease;
}

/* HOVER */
.card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 12px 28px rgba(0,0,0,0.12);
  color:#fff;
}

/* COLORES */
.card.c1:hover{background:#4f7cff;border-color:#4f7cff;}
.card.c2:hover{background:#8b6df2;border-color:#8b6df2;}
.card.c3:hover{background:#2bb5b5;border-color:#2bb5b5;}
.card.c4:hover{background:#e67e22;border-color:#e67e22;}

/* TEXTO */
.card span{
  font-size:clamp(11px,2.5vw,13px);
  font-weight:600;
  margin-bottom:6px;
}

.card h2{
  font-size:clamp(14px,3vw,18px);
  line-height:1.4;
}

/* FOOTER */
footer{
  text-align:center;
  font-size:12px;
  color:var(--text2);
  padding:1rem;
}

/* 📱 MOBILE EXTRA */
@media (max-width:480px){

  header{
    padding:1.5rem 1rem;
  }

  main{
    grid-template-columns:1fr;
  }

  .card{
    min-height:110px;
    padding:18px;
  }

  .card h2{
    font-size:16px;
  }
}

/* 💻 PANTALLAS GRANDES */
@media (min-width:1200px){
  main{
    max-width:1100px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Guía Acredita Bach</h1>
  <p>Acuerdo 286 · Preparación por sesiones</p>
</header>

<main>

  <a class="card c1" href="./Sesion1.html">
    <span>Clase 1</span>
    <h2>Estrategias de comprensión lectora</h2>
  </a>

  <a class="card c2" href="./Sesion3.html">
    <span>Clase 2</span>
    <h2>Recursos de análisis literario</h2>
  </a>

  <a class="card c3" href="./acuerdo286_composicion_textos.html">
    <span>Clase 3</span>
    <h2>Procesos de composición de textos</h2>
  </a>

  <a class="card c4" href="./acuerdo286_formas_orales.html">
    <span>Clase 4</span>
    <h2>Formas orales de la comunicación</h2>
  </a>

</main>

<footer>
  Material de apoyo · Acredita Bach (Acuerdo 286)
</footer>

</body>
</html>
