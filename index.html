<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía Acredita Bach · Acuerdo 286</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --border:#d6dbe6;
  --text:#1a1a1a;
  --text2:#4a5568;
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  text-align:center;
  padding:2rem 1rem 1.5rem;
}

header h1{
  font-size:28px;
  margin-bottom:6px;
}

header p{
  color:var(--text2);
  font-size:14px;
}

/* GRID */
main{
  max-width:900px;
  margin:auto;
  padding:2rem;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}

/* CARD BASE */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
  text-decoration:none;
  color:inherit;
  transition:all .25s ease;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:140px;
}

/* HOVER GENERAL */
.card:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 10px 25px rgba(0,0,0,0.10);
  color:#fff;
}

/* COLORES POR CLASE */
.card.c1:hover{
  background:#4f7cff;
  border-color:#4f7cff;
}

.card.c2:hover{
  background:#8b6df2;
  border-color:#8b6df2;
}

.card.c3:hover{
  background:#2bb5b5;
  border-color:#2bb5b5;
}

.card.c4:hover{
  background:#e67e22;
  border-color:#e67e22;
}

/* TEXTO */
.card span{
  font-size:12px;
  font-weight:600;
  margin-bottom:8px;
}

.card h2{
  font-size:16px;
  line-height:1.4;
}

/* FOOTER */
footer{
  text-align:center;
  font-size:12px;
  color:var(--text2);
  padding:1rem;
}

/* RESPONSIVE */
@media(max-width:600px){
  main{padding:1rem}
}
</style>
</head>

<body>

<header>
  <h1>Lenguajes y Comunicación</h1>
  <p>Acuerdo 286 NEM</p>
  <h4>Ing. Brian Chim Pech</h4>
</header>

<main>

  <a class="card c1" href="./Sesion1.html">
    <span>Clase 1</span>
    <h2>Estrategias de comprensión lectora</h2>
  </a>

  <a class="card c2" href="./Sesion3.html">
    <span>Clase 2</span>
    <h2>Recursos de análisis literario</h2>
  </a>

  <a class="card c3" href="./acuerdo286_composicion_textos.html">
    <span>Clase 3</span>
    <h2>Procesos de composición de textos</h2>
  </a>

  <a class="card c4" href="./acuerdo286_formas_orales.html">
    <span>Clase 4</span>
    <h2>Formas orales de la comunicación</h2>
  </a>

</main>

<footer>
  Material de apoyo · Acredita Bach (Acuerdo 286)
</footer>

</body>
</html>
